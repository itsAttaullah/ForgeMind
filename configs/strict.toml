# ForgeMind strict profile
# Writes and exec require approval; tighter budgets and optional cost cap.

profile = "strict"
log_level = "INFO"

[budgets]
max_steps = 30
max_tool_calls = 80
max_repair_iterations = 2
timeout_seconds = 900.0
max_cost_usd = 5.0

[policy]
permissions = ["repo.read", "repo.write", "test.run", "git.read"]
path_denylist = [
  ".env",
  ".env.*",
  "**/.env",
  "**/.env.*",
  "**/secrets/**",
  "**/*.pem",
  "**/*.key",
  "**/*credentials*",
  ".git/objects/**",
  "**/.git/objects/**",
]
risk_classes_requiring_approval = ["write", "exec", "mutate_git", "mutate_remote"]
paths_requiring_approval = [
  "**/pyproject.toml",
  "**/package-lock.json",
  "**/pnpm-lock.yaml",
  "**/yarn.lock",
  "**/uv.lock",
  "**/Cargo.lock",
  "**/poetry.lock",
]
